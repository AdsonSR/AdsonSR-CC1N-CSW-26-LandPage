<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!--GOOGLE FONTS-->
    <link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Montserrat:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">
    <!--FIM GOOGLE FONTS-->
    <link rel="stylesheet" href="style.css">
    <title>Contato</title>
</head>
<body>
    <header>
        <div class="interface">
            <div class="logo">
                <a href="./index.html">
                    <img src="./images/logo.jpeg" alt="logo da home" width="140px">
                </a>
            </div><!--logo-->

            <nav class="menu-desktop">
                <ul>
                    <li><a href="./curriculo.html">Currículo</a></li>
                    <li><a href="./github.html">GitHub</a></li>
                    <li><a href="./servicos.html">Serviços</a></li>
                </ul>
            </nav>

            <div class="btn-contato">
                <a href="./contato.html">
                    <button>Contato</button>
                </a>
            </div><!--btn-contato-->
        </div><!--interface-->
    </header>

    <main>
        <section class="topo-do-site">
            <div class="interface">
                <div class="flex">
                    <div class="txt-topo-site">
                        <h1>Formulário de Contato:</h1>
                            <div class="tabelaS">
                                <table border="1">
                                    <tbody>
                                        <tr>
                                            <th><label for="">Nome completo</label></th>
                                            <td><input type="text" name="nome-usuario" id="nome-usuário" size="30" maxlength="30"
                                            value=""
                                            placeholder="Digite o nome do usuário" required></td>
                                        </tr>
                                        <br>
                                        <tr>
                                            <th><label for="tel">Tel:</label></th>
                                            <td><input type="tel" id="tel" name="Tel" size="30" maxlength="30"></td>
                                        </tr>
                                        <br>
                                        <tr>
                                            <th><label for="e-mail">E-mail</label></th>
                                            <td><input type="email" id="email" name="email" size="30" maxlength="30" value=""
                                            placeholder="Digite seu email com @" required><br></td>                                        
                                        </tr>
                                        <br>
                                        <tr>
                                            <th>
                                                <label for="">Tipo de Serviço:</label>
                                            </th>
                                            <td>
                                                <select name="serviço" size="1">
                                                    <option value="">Selecione</option>
                                                    <option value="frontend">frontend</option>
                                                    <option value="backend">backend</option>
                                                    <option value="fullstack">fullstack</option>                                                                                                
                                                </select>
                                            </td>
                                        </tr>
                                        <tr>
                                            <th>
                                                <label for="">Tipo do Cliente:</label>
                                            </th>
                                            <td>
                                                <select name="cliente" size="1">
                                                    <option value="">Selecione</option>
                                                    <option value="cpf">CPF</option>
                                                    <option value="cnpj">CNPJ</option>                                                                                                                                             
                                                </select>
                                            </td>
                                        </tr>
                                        <tr>
                                            <th colspan="2">
                                                <label for="">Descrição do Serviço:</label> <br>
                                                <textarea name="comentario" cols="50" rows="10" placeholder="Escreva suas necessidades aqui!"></textarea>
                                            </th>
                                        </tr>
                                        <tr>
                                            </form>
                                            <th><input type="submit" value="Enviar">
                                            <input type="reset" value="Limpar"></th>
                                        </tr>                                        
                                    </tbody>
                                </table>                                 
                            </div><!--tabelaS-->                            
                    </div><!--txt-topo-site-->                                
                </div><!--flex-->
            </div><!--interface-->
        </section><!--topo-do-site-->
    </main>                


    <footer>
        <div class="interface">
            <div class="line-footer">
                    <div class="logo-footer">
                        <img src="./images/logo.jpeg" alt="logo do rodapé" width="100px">
                    </div><!--logo-footer-->
            </div><!--line-footer-->

            <div class="line-footer border">
                <p><img src="./images/e-mail.png" alt="logo do email" width="30px"><a href="https://accounts.google.com/">contato@adson.com.br</a></p>                             
            </div><!--line-footer-->
        </div><!--interface-->
    </footer>    
</body>
</html>
